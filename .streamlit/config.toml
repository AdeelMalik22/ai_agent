[theme]
primaryColor = "#0068C9"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
address = "0.0.0.0"
port = 8501
maxUploadSize = 500
maxMessageSize = 500
enableCORS = true
enableXsrfProtection = true
headless = true

[logger]
level = "info"

[runner]
magicEnabled = true
fastReruns = true