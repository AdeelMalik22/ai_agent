[theme]
primaryColor = "#0068C9"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
maxUploadSize = 200
maxMessageSize = 200
enableCORS = true
enableXsrfProtection = true
headless = true

[logger]
level = "info"

[runner]
magicEnabled = true
fastReruns = true

