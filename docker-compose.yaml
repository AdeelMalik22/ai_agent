
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: always

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: ai_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - .:/app
    restart: always